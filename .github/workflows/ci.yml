name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Strict typecheck (core modules)
        run: npm run typecheck:strict

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          MONGO_URL: mongodb://127.0.0.1:27017
          SESSION_SECRET: ci-session-secret-min-32-characters-xx

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npx playwright test
        env:
          CI: true
          APP_HOST: 127.0.0.1
          APP_PORT: '3001'
          MONGO_URL: mongodb://127.0.0.1:27017
          SESSION_SECRET: ci-session-secret-min-32-characters-xx
